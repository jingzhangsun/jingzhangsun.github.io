# SMILab 实验室网站配置
# 维护提示：日常更新通常只需要改 _pages/、_publications/、images/ 和本文件。

locale: "en-US"
site_theme: "default"
title: "SMILab"
title_separator: "-"
name: &name "Jingzhang Sun"
description: &description "personal description"
url: "https://jingzhangsun.github.io"
baseurl: ""
repository: "jingzhangsun/jingzhangsun.github.io"

# 作者侧栏信息：留空的字段不会显示。
author:
  avatar: "Profile.jpg"
  name: "Jingzhang Sun"
  pronouns:
  bio: "HNU SMILab PI"
  location: "Haikou, Hainan, China"
  employer: "Hainan University"
  uri:
  email: "jingzhangsun@hainanu.edu.cn"
  googlescholar:
  orcid:
  researchgate:
  github:
  zhihu:

# 论文页面按年份分组展示；顺序就是网页中的展示顺序。
publication_category:
  2026:
    title: "2026"
  2025:
    title: "2025"
  2024:
    title: "2024"
  2023:
    title: "2023"
  Before 2023:
    title: "Before 2023"

# 站点行为
future: true
read_more: "disabled"
words_per_minute: 160
atom_feed:
  hide: true
  path:

# Jekyll 读取范围：_pages 里的页面会按 permalink 输出。
include:
  - _pages
exclude:
  - .asset-cache
  - .bundle
  - .github
  - .jekyll-assets-cache
  - .jekyll-cache
  - .sass-cache
  - .vscode
  - Dockerfile
  - Gemfile
  - LICENSE
  - README.md
  - docker-compose.yaml
  - node_modules
  - package.json
  - tmp
  - vendor
keep_files:
  - .git
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

# Markdown 渲染
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

# 当前只保留论文 collection；课程、演讲、作品集等模板功能已清理。
collections:
  publications:
    output: true
    permalink: /:collection/:path/

# 页面默认值；单个页面 front matter 中的同名字段会覆盖这里。
defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: false
  - scope:
      path: ""
      type: publications
    values:
      layout: single
      author_profile: false

# Sass/SCSS
sass:
  sass_dir: _sass
  style: compressed

# URL 输出
permalink: /:categories/:title/
timezone: Asia/Shanghai

# GitHub Pages 可用插件；只保留当前网站实际需要的插件。
plugins:
  - jekyll-sitemap
  - jekyll-redirect-from

whitelist:
  - jekyll-sitemap
  - jekyll-redirect-from

# HTML 压缩
compress_html:
  clippings: all
  ignore:
    envs: development
